[tools]
node = "24.4.1"
elixir = "1.20.1-otp-29"
erlang = "29.0.2"
python = "3.14.2"
rust = "1.92.0"
"github:can1357/oh-my-pi" = "latest"

[env]
_.file = [".env", ".env.local"]

KERL_BUILD_DOCS="yes"
KERL_CONFIGURE_OPTIONS="--disable-debug --disable-silent-rules --enable-dynamic-ssl-lib --enable-shared-zlib --enable-smp-support --enable-threads --enable-wx --with-wx-config={{ exec(command='brew --prefix wxwidgets@3.2') }}/bin/wx-config-3.2 --with-ssl={{ exec(command='brew --prefix openssl') }} --without-javac --enable-darwin-64bit --enable-kernel-poll --with-dynamic-trace=dtrace"

[settings]
env_shell_expand = true

